<main class="container">
  <h2 class="mb-5">Nuevo Producto</h2>
  <form [formGroup]="productForm" (submit)="onSubmit()">
    <div class="row">
      <div class="col-4 mb-3">
        <label for="code" class="form-label">Codigo</label>
        <input id="code" formControlName="code" class="form-control" />
      </div>
      <div class="col-8 mb-3">
        <label for="name" class="form-label">Nombre</label>
        <input id="name" formControlName="name" type="text" class="form-control" />
      </div>
    </div>

    <div class="mb-3">
      <label for="price" class="form-label">Precio</label>
      <input id="price" formControlName="price" type="number" class="form-control" />
    </div>
    <div class="mb-3">
      <label for="desription" class="form-label">Descripción</label>
      <textarea
        id="description"
        formControlName="description"
        class="form-control"
        rows="4"
      ></textarea>
    </div>
    <div class="mb-3">
      <label for="imageUrl" class="form-label">Url Imagen</label>
      <input formControlName="imageUrl" type="url" class="form-control" id="imageUrl" />
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
      <button class="btn btn-primary me-md-2" type="submit" [disabled]="productForm.invalid">
        Enviar
      </button>
      <button class="btn btn-primary" type="reset">Cancelar</button>
    </div>
  </form>
</main>
