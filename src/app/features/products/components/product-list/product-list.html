<main class="container">
  <h1 class="mt-3 mb-4 text-center">Catálogo de productos</h1>

  <!-- Barra de busqueda -->
  <div class="card mb-3">
    <div class="card-body row column-gap-2">
      <input class="form-control col" placeholder="Filtrar por nombre" />
      <button class="btn btn-primary col-auto" (click)="onSearch()">Buscar</button>
    </div>
  </div>

  <!-- Listado de productos -->
  @if (products().length === 0) {
    <div class="alert alert-primary" role="alert">
      No hay productos disponibles con filtro aplicado.
    </div>
  } @else {
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th>Codigo</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products(); track product.code) {
          <tr class="align-middle">
            <td class="align-middle">{{ product.code }}</td>
            <td>{{ product.name }}</td>
            <td class="align-middle">{{ product.price | currency: 'COP' : 'symbol-narrow' }}</td>
            <!-- pipes -->
            <td>
              <div class="row column-gap-2 px-2">
                <!-- <button class="btn btn-secondary col" (click)="onView(product)">Ver</button> -->
                <button class="btn btn-secondary col" [routerLink]="['/products', product.code]">
                  Ver
                </button>
                <button class="btn btn-danger col">Eliminar</button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</main>
